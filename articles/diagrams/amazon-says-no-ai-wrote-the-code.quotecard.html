<!DOCTYPE html>
<!-- Source for articles/amazon-says-no-ai-wrote-the-code.quotecard.png
     Regenerate: open in Playwright, screenshot #card. See diagrams/README.md -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d9d4cc;
    --paper: #faf8f4;
    --accent: #a63a1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #card {
    width: 940px;
    padding: 58px 64px 50px;
    background: var(--paper);
  }
  .kicker {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .mark {
    font-size: 74px;
    line-height: 0.4;
    color: var(--line);
    font-family: Georgia, "Times New Roman", serif;
    height: 34px;
  }
  blockquote {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.42;
    letter-spacing: -0.01em;
    margin: 6px 0 26px;
  }
  blockquote .em { color: var(--accent); }
  .attr {
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
    font-size: 15px;
  }
  .attr .who { font-weight: 700; }
  .attr .what { color: var(--muted); }
</style>
</head>
<body>
  <script>
    addEventListener("DOMContentLoaded", () => {
      const s = new URLSearchParams(location.search).get("scale");
      if (s) document.getElementById("card").style.zoom = s;
    });
  </script>
  <div id="card">
    <div class="kicker">He named it "verification debt"</div>
    <div class="mark">&ldquo;</div>
    <blockquote>AI can generate code faster than you can understand it. That gap allows software to move toward production <span class="em">before anyone has truly validated what it actually does.</span></blockquote>
    <div class="attr">
      <span class="who">Werner Vogels, CTO, AWS</span>
      <span class="what">— re:Invent keynote, December 4, 2025</span>
    </div>
  </div>
</body>
</html>
