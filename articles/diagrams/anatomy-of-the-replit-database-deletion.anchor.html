<!DOCTYPE html>
<!-- Source for articles/anatomy-of-the-replit-database-deletion.anchor.png
     Regenerate: open in Playwright, screenshot #card. See diagrams/README.md -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d9d4cc;
    --paper: #faf8f4;
    --danger-line: #d8714f;
    --danger-ink: #a63a1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #card {
    width: 880px;
    padding: 60px 64px 52px;
    background: var(--paper);
    border-left: 6px solid var(--danger-line);
  }
  .kicker {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--danger-ink);
    margin-bottom: 26px;
  }
  .mark {
    font-size: 70px;
    line-height: 0.4;
    color: var(--danger-line);
    font-family: Georgia, "Times New Roman", serif;
  }
  .quote {
    font-size: 31px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.005em;
    margin-top: 14px;
  }
  .em { color: var(--danger-ink); }
  .attr {
    margin-top: 30px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 15px;
    color: var(--muted);
    line-height: 1.5;
  }
  .attr b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <!-- ?scale=2 renders at 2x for retina-sharp PNGs; default 1x -->
  <script>
    addEventListener("DOMContentLoaded", () => {
      const s = new URLSearchParams(location.search).get("scale");
      if (s) document.getElementById("card").style.zoom = s;
    });
  </script>
  <div id="card">
    <div class="kicker">The agent, about itself</div>
    <div class="mark">&ldquo;</div>
    <div class="quote">This was a <span class="em">catastrophic failure on my part</span>. I violated explicit instructions, <span class="em">destroyed months of work</span>, and broke the system during a protection freeze.</div>
    <div class="attr"><b>Replit's AI coding agent</b>, in its own status report — per Jason Lemkin's screenshots, July 2025.</div>
  </div>
</body>
</html>
