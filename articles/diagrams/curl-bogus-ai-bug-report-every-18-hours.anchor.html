<!DOCTYPE html>
<!-- Source for articles/curl-bogus-ai-bug-report-every-18-hours.anchor.png
     Regenerate: open in Playwright, screenshot #card. See diagrams/README.md -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d9d4cc;
    --paper: #faf8f4;
    --slop-bg: #fbeae6;
    --slop-line: #d8714f;
    --slop-ink: #a63a1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #card {
    width: 880px;
    padding: 56px 64px 44px;
    background: var(--paper);
    border-left: 6px solid var(--slop-line);
  }
  .kicker {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slop-ink);
    margin-bottom: 22px;
  }
  .quote {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.32;
    letter-spacing: -0.01em;
  }
  .quote .mark { color: var(--slop-line); }
  .attr {
    margin-top: 30px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 16px;
    color: var(--ink);
  }
  .attr .who { font-weight: 700; }
  .attr .what { color: var(--muted); }
</style>
</head>
<body>
  <!-- ?scale=2 renders at 2x for retina-sharp PNGs; default 1x -->
  <script>
    addEventListener("DOMContentLoaded", () => {
      const s = new URLSearchParams(location.search).get("scale");
      if (s) document.getElementById("card").style.zoom = s;
    });
  </script>
  <div id="card">
    <div class="kicker">On shutting curl's bug bounty &mdash; end of Jan 2026</div>
    <div class="quote"><span class="mark">&ldquo;</span>We are effectively being DDoSed. If we could, we would charge them for this waste of our time.<span class="mark">&rdquo;</span></div>
    <div class="attr"><span class="who">Daniel Stenberg</span> <span class="what">&mdash; curl's lead maintainer, who has triaged the queue for going on three decades</span></div>
  </div>
</body>
</html>
