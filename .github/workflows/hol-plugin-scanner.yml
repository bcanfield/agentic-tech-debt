name: HOL Plugin Scanner

# Required CI gate for the awesome-codex-plugins marketplace (PR #194).
# Scores the plugin bundle and fails on critical/high findings.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write  # SARIF upload to the Security tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@9dd4a8bcefaf7141202e3c459227c8da0f4b69ff # v1.2.150
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
