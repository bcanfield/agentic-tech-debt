name: HOL Plugin Scanner

# Required CI gate for the awesome-codex-plugins marketplace (PR #194).
# Scores the plugin bundle and fails on critical/high findings.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write  # SARIF upload to the Security tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@b819c2bf2203fd902250ddab9dd82f0c8aff50ab # v1.2.477
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
